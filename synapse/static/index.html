<!DOCTYPE html>
<html lang="en">
  <head>
   <title>WhatsApp Clone is running</title>
   <style>
       body {
         font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen-Sans,Ubuntu,Cantarell,"Helvetica Neue",sans-serif;
         max-width: 40em;
         margin: auto;
         text-align: center;
         background: linear-gradient(135deg, #075E54 0%, #128C7E 50%, #25D366 100%);
         min-height: 100vh;
         color: #fff;
       }
       h1 {
         margin: 1em;
         font-size: 2em;
       }
       p {
         margin: 1em;
         font-size: 1.1em;
         color: rgba(255,255,255,0.9);
       }
       hr {
        border: none;
        background-color: rgba(255,255,255,0.3);
        height: 1px;
        width: 7em;
        margin: 3em auto;
      }
       .logo {
         display: block;
         margin: 3em auto 1em;
         font-size: 5em;
       }
       .badge {
         display: inline-block;
         background: rgba(255,255,255,0.2);
         padding: 0.4em 1.2em;
         border-radius: 2em;
         font-size: 0.9em;
         margin-top: 0.5em;
       }
       a {
         color: #DCF8C6;
         text-decoration: none;
         font-weight: bold;
       }
       a:hover {
         text-decoration: underline;
       }
       .features {
         display: flex;
         justify-content: center;
         gap: 2em;
         flex-wrap: wrap;
         margin: 2em 0;
       }
       .feature {
         background: rgba(255,255,255,0.15);
         border-radius: 1em;
         padding: 1.2em 1.5em;
         min-width: 120px;
       }
       .feature .icon {
         font-size: 2em;
         margin-bottom: 0.3em;
       }
       .feature .label {
         font-size: 0.9em;
       }
   </style>
  </head>
  <body>
    <div class="logo">💬</div>
    <h1>WhatsApp Clone Server is Running</h1>
    <p>Your messaging server is online and ready to send & receive messages.</p>
    <div class="features">
      <div class="feature">
        <div class="icon">🔒</div>
        <div class="label">End-to-End Encrypted</div>
      </div>
      <div class="feature">
        <div class="icon">📞</div>
        <div class="label">Voice & Video Calls</div>
      </div>
      <div class="feature">
        <div class="icon">👥</div>
        <div class="label">Group Chats</div>
      </div>
      <div class="feature">
        <div class="icon">📁</div>
        <div class="label">File Sharing</div>
      </div>
    </div>
    <hr>
    <p>
      <small>
        WhatsApp Clone &mdash; Built with ❤️ Rahul singh
      </small>
    </p>
  </body>
</html>
